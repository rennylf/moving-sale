<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="format-detection" content="telephone=no" />
<title>搬家出闲置</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* —— Claude 视觉风格：奶米底 + 陶土橙 + 衬线大标题 + 克制留白 —— */
  :root{
    --bg:#faf9f5;          /* 奶米色背景 */
    --card:#ffffff;         /* 卡片白 */
    --ink:#1f1f1f;          /* 墨黑文字 */
    --muted:#8a857c;        /* 暖灰辅文 */
    --line:#e8e6e0;         /* 细分隔线 */
    --accent:#c96442;       /* Claude 陶土橙 */
    --accent-hover:#a8512f;
    --accent-soft:#f5e3da;  /* 强调背景 */
    --free:#5a8f6b;         /* 暖绿 */
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
    --serif:'Source Serif 4','Source Serif Pro',Georgia,'Songti SC','STSong',serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:var(--sans);line-height:1.65;font-size:15px;
    font-feature-settings:"cv11","ss01";-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:980px;margin:0 auto;padding:0 24px}

  /* Header */
  header{padding:64px 0 40px;border-bottom:1px solid var(--line)}
  header h1{margin:0 0 14px;font-family:var(--serif);font-size:34px;font-weight:500;
    letter-spacing:-0.5px;color:var(--ink);line-height:1.25}
  header p{margin:0;color:var(--muted);font-size:16px;max-width:620px;line-height:1.7}
  .meta{margin-top:22px;display:flex;flex-wrap:wrap;gap:10px 22px;font-size:13.5px;color:#666}
  .meta span{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}

  /* Toolbar */
  .toolbar{position:sticky;top:0;z-index:20;background:rgba(250,249,245,.85);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:14px 0}
  .toolbar .wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filters{display:flex;gap:8px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:transparent;border-radius:999px;padding:7px 16px;
    font-size:13.5px;cursor:pointer;transition:.15s;color:#5a5651;font-family:var(--sans)}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .count{margin-left:auto;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}

  /* Purchase note banner */
  .notice{margin:28px 0 0;background:var(--accent-soft);
    border-radius:10px;padding:14px 18px;font-size:14px;
    color:#6b4a3a;line-height:1.75}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:32px 0 56px}
  .card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);
    border:1px solid var(--line);
    display:flex;flex-direction:column;transition:.2s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(0,0,0,.05),0 12px 28px rgba(0,0,0,.08)}
  .card.sold{opacity:.55}
  .thumb{position:relative;aspect-ratio:4/3;background:#f0ede5;cursor:pointer;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
  .card:hover .thumb img{transform:scale(1.03)}
  .badge{position:absolute;top:12px;left:12px;font-size:12px;padding:4px 11px;border-radius:999px;
    color:#fff;font-weight:500;letter-spacing:.2px;font-family:var(--sans)}
  .badge.paid{background:var(--accent)}
  .badge.free{background:var(--free)}
  .status{position:absolute;top:12px;right:12px;font-size:12px;padding:4px 10px;border-radius:6px;
    background:rgba(31,31,31,.7);color:#fff;backdrop-filter:blur(4px)}
  .status.reserved{background:rgba(201,100,66,.85)}
  .status.sold{background:rgba(60,60,60,.85)}
  .body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
  .name{font-family:var(--serif);font-size:16px;font-weight:500;margin:0 0 8px;
    letter-spacing:-0.1px;color:var(--ink)}
  .desc{font-size:13px;color:#6b6660;margin:0 0 14px;flex:1;line-height:1.6}
  .price{font-size:18px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;
    letter-spacing:-0.3px}
  .price.free{color:var(--free)}
  .cat{display:inline-block;font-size:11px;color:var(--muted);border:1px solid var(--line);
    border-radius:4px;padding:1px 7px;margin-left:8px;vertical-align:middle;
    font-family:var(--sans);letter-spacing:.3px}

  /* Contact */
  .contact{border-top:1px solid var(--line);padding:56px 0 72px}
  .contact .wrap{display:flex;gap:40px;flex-wrap:wrap;align-items:center;justify-content:center;text-align:center}
  .qr{width:168px;height:168px;border-radius:10px;border:1px solid var(--line);
    object-fit:cover;background:#fafafa;padding:6px}
  .contact h3{margin:0 0 10px;font-family:var(--serif);font-size:22px;font-weight:500;
    letter-spacing:-0.3px;color:var(--ink)}
  .wxid{font-size:15px;color:var(--accent);font-weight:500;
    background:var(--accent-soft);padding:9px 18px;border-radius:8px;display:inline-block;margin:8px 0;
    letter-spacing:.2px}
  .contact p{color:var(--muted);font-size:14px;margin:8px 0 0;max-width:380px;line-height:1.7}
  footer{text-align:center;color:#b8b4ab;font-size:12px;padding:24px 0 36px;letter-spacing:.3px}

  /* Lightbox */
  .lb{position:fixed;inset:0;background:rgba(31,31,31,.94);display:none;
    align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
  .lb.open{display:flex}
  .lb img{max-width:92vw;max-height:88vh;border-radius:8px}
  .lb .close{position:absolute;top:22px;right:28px;color:#fff;font-size:32px;cursor:pointer;
    line-height:1;width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;background:rgba(255,255,255,.1)}

  @media(max-width:520px){
    header{padding:42px 0 28px}
    header h1{font-size:26px}
    .grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:24px 0 40px}
    .body{padding:12px 14px 14px}
    .name{font-size:14px}
    .desc{font-size:12px}
    .price{font-size:16px}
  }
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
      <div class="meta">
        <span>📍 <span id="location"></span></span>
        <span>🕑 <span id="pickupTime"></span></span>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="wrap">
      <div class="filters" id="filters"></div>
      <div class="count" id="count"></div>
    </div>
  </div>

  <main class="wrap">
    <div class="notice" id="notice"></div>
    <div class="grid" id="grid"></div>
  </main>

  <section class="contact">
    <div class="wrap">
      <img class="qr" id="qr" alt="微信二维码" />
      <div>
        <h3>想要哪件？加我微信 👇</h3>
        <div class="wxid">微信号：<span id="wechat"></span></div>
        <p id="note"></p>
      </div>
    </div>
  </section>

  <footer>因跨省搬家整理 · 诚意转让 · 感谢你的浏览</footer>

  <div class="lb" id="lb"><span class="close" id="lbClose">&times;</span><img id="lbImg" /></div>

  <script src="data.js"></script>
  <script>
    // 图片占位（无图或加载失败时显示）
    const PLACEHOLDER = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect width="100%" height="100%" fill="#eee"/><text x="50%" y="50%" font-size="20" fill="#bbb" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif">待补充照片</text></svg>');

    // 填充全局信息
    document.title = CONFIG.title;
    document.getElementById('title').textContent = CONFIG.title;
    document.getElementById('subtitle').textContent = CONFIG.subtitle;
    document.getElementById('location').textContent = CONFIG.location;
    document.getElementById('pickupTime').textContent = CONFIG.pickupTime;
    document.getElementById('wechat').textContent = CONFIG.wechat;
    document.getElementById('note').textContent = CONFIG.note;
    document.getElementById('notice').textContent = CONFIG.purchaseNote;
    const qr = document.getElementById('qr');
    qr.src = CONFIG.wechatQr;
    qr.onerror = () => { qr.src = PLACEHOLDER; };

    const STATUS = { available:'', reserved:'已预订', sold:'已送出/已售' };
    let currentFilter = 'all';

    function priceLabel(it){
      if (it.priceText) return it.priceText;
      return it.price === 0 ? '免费' : '¥' + it.price;
    }

    function render(){
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const list = ITEMS.filter(it => {
        if (currentFilter === 'free') return it.price === 0;
        if (currentFilter === 'paid') return it.price > 0;
        return true;
      });
      list.forEach(it => {
        const free = it.price === 0;
        const img = (it.images && it.images[0]) ? it.images[0] : PLACEHOLDER;
        const card = document.createElement('div');
        card.className = 'card' + (it.status==='sold' ? ' sold':'');
        card.innerHTML = `
          <div class="thumb">
            <img src="${img}" alt="${it.name}" loading="lazy"
                 onerror="this.src='${PLACEHOLDER}'">
            <span class="badge ${free?'free':'paid'}">${free?'免费送':'有偿'}</span>
            ${it.status!=='available' ? `<span class="status ${it.status}">${STATUS[it.status]}</span>`:''}
          </div>
          <div class="body">
            <p class="name">${it.name}<span class="cat">${it.category}</span></p>
            <p class="desc">${it.desc||''}</p>
            <div class="price ${free?'free':''}">${priceLabel(it)}</div>
          </div>`;
        card.querySelector('.thumb').addEventListener('click', ()=>openLB(img));
        grid.appendChild(card);
      });
      document.getElementById('count').textContent = `共 ${list.length} 件`;
    }

    // 筛选按钮
    const filters = [
      {key:'all', label:'全部'},
      {key:'paid', label:'有偿转让'},
      {key:'free', label:'免费赠送'}
    ];
    const fbox = document.getElementById('filters');
    filters.forEach((f,i)=>{
      const b = document.createElement('button');
      b.className = 'chip' + (i===0?' active':'');
      b.textContent = f.label;
      b.onclick = ()=>{
        currentFilter = f.key;
        [...fbox.children].forEach(c=>c.classList.remove('active'));
        b.classList.add('active');
        render();
      };
      fbox.appendChild(b);
    });

    // 大图
    const lb = document.getElementById('lb');
    function openLB(src){ document.getElementById('lbImg').src = src; lb.classList.add('open'); }
    lb.addEventListener('click', ()=>lb.classList.remove('open'));

    render();
  </script>
</body>
</html>
